name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate static site
        run: |
          node --check app.js

      - name: Stage anonymous project showcase
        run: |
          mkdir -p _site/artifacts _site/assets
          cp index.html styles.css app.js favicon.ico robots.txt .nojekyll _site/
          cp artifacts/binary-search.html _site/artifacts/
          cp artifacts/dijkstra-shortest-path.html _site/artifacts/
          cp artifacts/unique-paths.html _site/artifacts/
          cp artifacts/trie-prefix-match.html _site/artifacts/
          cp assets/binary-search.png _site/assets/
          cp assets/dijkstra-shortest-path.png _site/assets/
          cp assets/unique-paths.png _site/assets/
          cp assets/trie-prefix-match.png _site/assets/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

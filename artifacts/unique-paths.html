<html lang="en">
<head>

<title>Unique Paths</title>
<link rel="icon" href="../favicon.ico">
<style>

* { box-sizing:border-box; }

.tick::before { content:''; position:absolute; left:4px; top:8px; bottom:8px; width:3px; border-radius:999px; background:#cbd5e1; }
.tick.keyframe::before { background:var(--amber); }
.tick.active { background:#eff6ff; border-color:var(--blue); color:#1d4ed8; }
.tick.active::before { background:var(--blue); }
.tick-label { color:#172033; font-size:12px; font-weight:700; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tick.active .tick-label { color:#1d4ed8; }
.tick-op { color:var(--muted); font-size:11px; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.objects { display:grid; gap:10px; width:max-content; max-width:none; min-width:0; transform-origin:top left; }

.primitive-panel .view-title { font-size:13px; margin-bottom:8px; }
.view-title { margin:0 0 10px; font-size:15px; }
.frame-stage-card { width:min(520px,70vw); min-height:168px; display:grid; align-content:center; justify-items:center; gap:10px; border:1px solid #bfdbfe; border-radius:8px; background:#eff6ff; color:#1e3a8a; padding:18px; text-align:center; }

.answer-badge { position:absolute; top:10px; right:10px; z-index:6; max-width:min(320px,42vw); border:1px solid #86efac; border-radius:8px; background:rgba(240,253,244,.96); color:#14532d; padding:8px 10px; box-shadow:0 1px 4px rgba(15,23,42,.12); font-size:12px; line-height:1.35; overflow-wrap:anywhere; }
.answer-badge strong { display:block; margin-bottom:2px; color:#166534; font-size:12px; }
.array { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end; }
.array-wrap { display:grid; gap:8px; width:fit-content; max-width:100%; }

.primary-scene.compound-scene .cell { min-width:38px; min-height:36px; }

.hot { border-color:var(--blue)!important; background:#eff6ff!important; color:#1d4ed8; }

.chip-row { display:flex; flex-wrap:wrap; gap:5px; }
.chip { border:1px solid var(--line); border-radius:999px; padding:2px 7px; color:var(--muted); background:#fff; font-size:11px; }
.chip.ok { color:#166534; border-color:#bbf7d0; background:#f0fdf4; }
.chip.warn { color:#92400e; border-color:#fde68a; background:#fffbeb; }
.chip.bad { color:#991b1b; border-color:#fecaca; background:#fef2f2; }
.diff-row { display:grid; gap:4px; padding:6px 0; border-top:1px solid #eef2f7; font-size:12px; }
.diff-row:first-child { border-top:0; padding-top:0; }
.diff-kind { width:max-content; border-radius:999px; padding:1px 6px; background:#eff6ff; color:#1d4ed8; font-size:11px; }
.mlgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; }
.mlitem { border:1px solid var(--line); border-radius:6px; padding:8px; background:#fbfdff; min-width:0; }
.mlitem strong { display:block; color:#374151; font-size:12px; margin-bottom:5px; }
.spark { width:100%; height:56px; border:1px solid var(--line); border-radius:5px; background:#fff; }
.debug-drawer { border-top:1px solid var(--line); background:#eef2f7; padding:0 10px 10px; }
.debug-drawer summary { list-style:none; display:flex; gap:12px; align-items:baseline; padding:12px 4px; cursor:pointer; color:#172033; }
.debug-drawer summary::-webkit-details-marker { display:none; }
.debug-drawer summary span { font-weight:700; }
.debug-drawer summary small { color:var(--muted); }
.debug-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
.debug-json { max-height:260px; }
.debug-download { display:inline-block; margin:0 0 8px; color:#1d4ed8; font-size:12px; text-decoration:none; }
.debug-download:hover { text-decoration:underline; }
.compact-details { margin-top:8px; }
.compact-details summary { list-style:none; display:flex; align-items:center; justify-content:space-between; gap:8px; cursor:pointer; color:#374151; font-size:12px; font-weight:700; }
.compact-details summary::-webkit-details-marker { display:none; }
.compact-details summary::after { content:'Expand'; border:1px solid var(--line); border-radius:999px; padding:1px 6px; color:var(--muted); background:#fff; font-size:11px; font-weight:500; }
.compact-details[open] summary::after { content:'Collapse'; }
.compact-details > :not(summary) { margin-top:7px; }
@media (max-width:1100px) {
  .workspace { grid-template-columns:1fr; }
  .topbar { grid-template-columns:1fr; }
  .badges { justify-content:flex-start; }
  .debug-grid { grid-template-columns:1fr; }
  .task-col { max-height:360px; overflow:auto; padding-right:2px; }
  .teaching-col { max-height:none; overflow:visible; padding-right:2px; }
}
@media (max-width:560px) {
  .topbar,.workspace { padding:10px; }
  .top-summary { grid-template-columns:1fr; }
  .hero { min-height:0; grid-template-rows:auto minmax(300px,380px) auto auto; }
  .canvas { height:380px; max-height:none; min-height:300px; }
  .spatial-stage { height:280px; }
  .controls { grid-template-columns:repeat(3,1fr); }
  .controls .range { grid-column:1 / -1; }
  .counter { grid-column:1 / -1; text-align:left; min-width:0; }
  .controls button { min-width:0; padding:8px 6px; }
  .checkpoint-input-row,.learning-log-summary,.learning-log-actions { grid-template-columns:1fr; }
  .checkpoint-input-row button { width:100%; }
  .maprow,.evidence-line { grid-template-columns:1fr; }
}

<div class="app" data-render-target="teaching_2d">
  <header class="topbar">
    <div class="top-title"><h1 id="title"></h1><p id="subtitle" class="subtitle"></p></div>
    <div class="top-summary" aria-label="Current task summary">
      <div class="summary-card"><span>Current output</span><strong id="top-result"></strong></div>
      <div class="summary-card"><span>Current solution</span><strong id="top-solution"></strong></div>
    </div>
    <div id="badges" class="badges"></div>
  </header>
  <main class="workspace">
    <aside class="col task-col">
      <section id="code-panel" class="panel section code-panel">
        <h2>Code</h2>
        <div id="code" class="code"></div>
      </section>
      <section class="panel section">
        <h2>Solution</h2>
        <div id="tabs" class="tabs"></div>
      </section>
      <section id="variant-compare-panel" class="panel section variant-compare-panel">
        <h2>Solution Comparison</h2>
        <div id="variant-compare" class="variant-compare"></div>
      </section>
    </aside>
    <section class="col">
      <div class="panel hero">
        <div class="step-head">
          <div><h2 id="step-title"></h2><p id="step-desc"></p></div>
          <div id="op" class="pill"></div>
        </div>
        <div id="canvas" class="canvas"></div>
        <div class="controls">
          <button id="prev">Previous</button>
          <button id="play" class="primary">Play</button>
          <button id="next">Next</button>
          <input id="range" class="range" type="range" min="0" value="0">
          <div id="counter" class="counter"></div>
        </div>
        <div id="timeline" class="timeline" aria-label="Semantic timeline"></div>
      </div>
    </section>
    <aside class="col teaching-col">
      <section id="teaching-panel" class="panel section"><h2>Explanation</h2><div id="teaching"></div></section>
      <section id="step-evidence-panel" class="panel section">
        <details class="compact-details step-evidence-details">
          <summary>Step Evidence</summary>
          <div id="step-evidence" class="step-evidence"></div>
        </details>
      </section>
      <section class="panel section"><h2>Interaction</h2><div id="interaction"></div></section>
      <section class="panel section"><h2>Current State</h2><div id="state" class="state-grid"></div></section>
    </aside>
  </main>
  <details id="debug-drawer" class="debug-drawer">
    <summary><span>Debug Drawer</span><small>Raw validation, state, and artifact evidence</small></summary>
    <div class="debug-grid">
      <section class="panel section"><h2>raw validation report</h2><div id="debug-evidence" class="evidence"></div><pre id="debug-validation-json" class="jsonbox debug-json"></pre></section>
      <section class="panel section"><h2>raw state JSON</h2><div id="debug-state" class="state-grid"></div></section>
      <section class="panel section"><h2>release gate</h2><div id="debug-release" class="evidence"></div></section>
      <section class="panel section"><h2>Artifact JSON</h2><a id="debug-artifact-download" class="debug-download" download="algolab-artifact.json">Download Artifact JSON</a><pre id="debug-artifact" class="jsonbox debug-json"></pre></section>
    </div>
  </details>
</div>
<script>
(function () {
  if (window.THREE && window.THREE.WebGLRenderer) {
    window.AlgoLabSpatialRuntime = { source: 'threejs' };
    return;
  }

  function hexToRgba(color, alpha) {
    const raw = String(color || '#94a3b8').replace('#', '');
    const full = raw.length === 3 ? raw.split('').map(c => c + c).join('') : raw.padEnd(6, '0').slice(0, 6);
    const value = parseInt(full, 16);
    return [((value >> 16) & 255) / 255, ((value >> 8) & 255) / 255, (value & 255) / 255, alpha ?? 1];
  }
  function compile(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(shader) || 'shader compile failed');
    return shader;
  }
  function program(gl) {
    const vertex = compile(gl, gl.VERTEX_SHADER, `
      attribute vec3 a_position;
      uniform float u_pointSize;
      void main() {
        gl_Position = vec4(a_position.xy, 0.0, 1.0);
        gl_PointSize = u_pointSize;
      }`);
    const fragment = compile(gl, gl.FRAGMENT_SHADER, `
      precision mediump float;
      uniform vec4 u_color;
      uniform float u_round;
      void main() {
        if (u_round > 0.5) {
          vec2 d = gl_PointCoord - vec2(0.5);
          if (dot(d, d) > 0.25) discard;
        }
        gl_FragColor = u_color;
      }`);
    const result = gl.createProgram();
    gl.attachShader(result, vertex);
    gl.attachShader(result, fragment);
    gl.linkProgram(result);
    if (!gl.getProgramParameter(result, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(result) || 'program link failed');
    return result;
  }

  class Vector3 {
    constructor(x = 0, y = 0, z = 0) { this.x = x; this.y = y; this.z = z; }
    set(x, y, z) { this.x = x; this.y = y; this.z = z; return this; }
    clone() { return new Vector3(this.x, this.y, this.z); }
  }
  class Scene {
    constructor() { this.children = []; }
    add(...items) { this.children.push(...items.filter(Boolean)); }
    clear() { this.children = []; }
  }
  class PerspectiveCamera {
    constructor(fov = 45, aspect = 1, near = 0.1, far = 100) {
      this.fov = fov; this.aspect = aspect; this.near = near; this.far = far;
      this.position = new Vector3(0, 0, 8);
      this.target = new Vector3(0, 0, 0);
    }
    lookAt(target) { this.target = target && target.clone ? target.clone() : new Vector3(); }
    updateProjectionMatrix() {}
  }
  class Geometry {
    constructor(kind, options = {}) { this.kind = kind; this.options = options; this.size = options.size || options.radius || 1; }
  }
  class SphereGeometry extends Geometry {
    constructor(radius = 1) { super('sphere', { radius, size: radius }); }
  }
  class BoxGeometry extends Geometry {
    constructor(width = 1, height = 1, depth = 1) { super('box', { width, height, depth, size: Math.max(width, height, depth) }); }
  }
  class CylinderGeometry extends Geometry {
    constructor(radiusTop = 1, radiusBottom = 1, height = 1) { super('cylinder', { radiusTop, radiusBottom, height, size: Math.max(radiusTop, radiusBottom, height * 0.35) }); }
  }

    constructor() { this.points = []; }

  }
  class MeshBasicMaterial {
    constructor(options = {}) { this.color = options.color || '#94a3b8'; this.opacity = options.opacity ?? 1; }
  }
  class LineBasicMaterial extends MeshBasicMaterial {}

    }

    setClearColor(color, alpha = 1) { this.clearColor = hexToRgba(color, alpha); }

      this.canvas.width = Math.max(1, Math.floor(width));
      this.canvas.height = Math.max(1, Math.floor(height));
      if (updateStyle) {
        this.canvas.style.width = `${this.canvas.width}px`;
        this.canvas.style.height = `${this.canvas.height}px`;
      }
      this.gl.viewport(0, 0, this.canvas.width, this.canvas.height);
    }
    render(scene, camera) {
      const gl = this.gl;
      gl.useProgram(this.program);
      gl.clearColor(this.clearColor[0], this.clearColor[1], this.clearColor[2], this.clearColor[3]);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
      gl.enableVertexAttribArray(this.positionLocation);
      gl.vertexAttribPointer(this.positionLocation, 3, gl.FLOAT, false, 0, 0);
      const lines = scene.children.filter(item => item instanceof Line);
      const meshes = scene.children.filter(item => !(item instanceof Line)).sort((a, b) => (a.position.z || 0) - (b.position.z || 0));
      for (const line of lines) this.drawLine(line, camera);
      for (const mesh of meshes) this.drawMesh(mesh, camera);
      gl.flush();
    }
    project(point, camera) {
      const aspect = Math.max(0.5, camera.aspect || 1);
      const depth = Math.max(1.3, camera.position.z - (point.z || 0));
      const scale = 7 / depth;
      return {
        x: Math.max(-1, Math.min(1, (point.x * scale) / (4.8 * aspect))),

      this.gl.uniform1f(this.roundLocation, 0);
      this.gl.drawArrays(this.gl.LINES, 0, 2);

      const p = this.project(mesh.position, camera);
      const base = mesh.geometry && mesh.geometry.kind === 'box' ? 34 : 42;
      const size = Math.max(16, Math.min(78, base * (mesh.geometry?.size || 1) * (0.65 + p.scale * 0.35)));

      this.gl.uniform1f(this.roundLocation, mesh.geometry && mesh.geometry.kind === 'box' ? 0 : 1);

    Vector3,
    Scene,
    PerspectiveCamera,
    WebGLRenderer,
    SphereGeometry,
    BoxGeometry,
    CylinderGeometry,
    BufferGeometry,
    MeshBasicMaterial,
    LineBasicMaterial,
    Mesh,
    Line,

})();

    button.classList.toggle('selected', selected);
    button.classList.toggle('correct', selected && ok);
    button.classList.toggle('wrong', selected && !ok);
    button.setAttribute('aria-pressed', selected ? 'true' : 'false');
  });
}
function correctFeedback(value) {
  const interaction = frame().interaction || {};
  const optionText = optionExplanation(interaction, value);
  return optionText || interaction.explanation || '';
}
function wrongFeedback(value) {
  const interaction = frame().interaction || {};
  const teaching = frame().teaching || {};
  return optionExplanation(interaction, value)
    || interaction.wrong_explanation
    || teaching.common_mistake
    || interaction.explanation
    || 'No explanation is available for this incorrect choice.';
}
function showInteractionHint() {
  const teaching = frame().teaching || {};
  const evidence = frame().evidence || {};
  const deps = Array.isArray(evidence.deps) ? evidence.deps.filter(Boolean) : [];
  const targets = Array.isArray(evidence.targets) ? evidence.targets.filter(Boolean) : [];
  const msg = teaching.hint
    || teaching.invariant
    || teaching.common_mistake
    || (deps.length ? `Inspect these dependencies first: ${deps.slice(0, 4).join(', ')}.` : '')
    || (targets.length ? `Focus on the current target: ${targets.slice(0, 4).join(', ')}.` : '')
    || 'Observe the highlighted object and state change before making a prediction.';
  setNeutralFeedback(msg, 'teaching.hint/evidence');
  logLearningEvent('hint', { source:'teaching.hint/evidence' });
}
function revealInteractionAnswer() {
  const interaction = frame().interaction || {};
  const answer = interaction.answer;
  const answerText = Array.isArray(answer) ? answer.map(compactValue).join(' / ') : compactValue(answer);
  const explanation = interaction.explanation || correctFeedback(answer) || '';
  setNeutralFeedback(`Reference answer: ${answerText}. ${explanation}`, 'interaction.answer');
  logLearningEvent('reveal', { answer:answerText, source:'interaction.answer' });
}
function optionExplanation(interaction, value) {
  const explanations = interaction && interaction.option_explanations || {};
  const key = String(value);
  if (Object.prototype.hasOwnProperty.call(explanations, key)) return String(explanations[key] || '');
  return '';
}
function feedbackSource(value, ok) {
  const interaction = frame().interaction || {};
  const teaching = frame().teaching || {};
  const explanations = interaction.option_explanations || {};
  if (Object.prototype.hasOwnProperty.call(explanations, String(value))) return 'interaction.option_explanations';
  if (!ok && interaction.wrong_explanation) return 'interaction.wrong_explanation';
  if (!ok && teaching.common_mistake) return 'teaching.common_mistake';
  return 'interaction.explanation';
}
function setFeedback(ok, message, value) {
  const node = $('feedback');
  const source = feedbackSource(value, ok);
  if (!node) return source;
  node.className = `feedback ${ok ? 'correct' : 'wrong'}`;
  node.dataset.source = source;
  node.dataset.correct = ok ? 'true' : 'false';
  const text = String(message || '');
  const prefix = ok ? 'Correct. ' : (text.trim().startsWith('Incorrect-choice explanation') ? '' : 'Incorrect-choice explanation: ');
  node.innerHTML = `${prefix}${esc(text)}<span class="feedback-source">Source: ${esc(source)}; reads only the current SceneGraph interaction / teaching data.</span>`;
  return source;
}
function setNeutralFeedback(message, source) {
  const node = $('feedback');
  if (!node) return;
  node.className = 'feedback hint';
  node.dataset.source = source;
  node.dataset.correct = 'hint';
  node.innerHTML = `${esc(message || '')}<span class="feedback-source">Source: ${esc(source)}; reads only the current SceneGraph interaction / teaching data.</span>`;
}
function renderCode(code, info) {
  const lines = String(code || '').split('\n');
  const active = Number(info && info.active) || 1;
  const status = info && info.status === 'ok' ? 'ok' : 'warn';
  const label = info && info.label ? info.label : `Current code line: ${active}`;
  const sync = `<div class="code-sync ${status}" data-active-line="${active}" data-code-line-status="${status}"><span>${esc(label)}</span></div>`;
  $('code').innerHTML = sync + lines.map((line,i)=>{
    const lineNo = i + 1;
    const lineActive = status === 'ok' && lineNo === active;
    const fallback = status !== 'ok' && lineNo === active;
    return `<div class="line ${lineActive ? 'active' : ''} ${fallback ? 'fallback' : ''}"><span class="lineno">${lineNo}</span><span class="code-text">${esc(line) || ' '}</span></div>`;
  }).join('');
}
function play() {
  if (timer) return stop();
  $('play').textContent = 'Pause';
  logLearningEvent('play', { step: stepIndex }, { markTouched:false });
  timer = setInterval(()=>{ if(stepIndex >= frames().length-1) return stop(); go(stepIndex+1, 'play'); }, 850);
}
function stop() { if(timer) clearInterval(timer); timer=null; $('play').textContent='Play'; }
$('prev').onclick = () => go(stepIndex-1, 'prev');
$('next').onclick = () => go(stepIndex+1, 'next');
$('play').onclick = play;
$('range').oninput = e => go(parseInt(e.target.value,10), 'range');
window.addEventListener('keydown', e => {
  if (e.defaultPrevented || e.altKey || e.ctrlKey || e.metaKey || e.shiftKey) return;
  const target = e.target instanceof Element ? e.target : null;
  if (target && target.closest('input, textarea, select, button, [contenteditable]')) return;
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    go(stepIndex - 1, 'keyboard');
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    go(stepIndex + 1, 'keyboard');
  } else if (e.key === ' ') {
    e.preventDefault();
    play();
  }
});
window.addEventListener('resize', () => { if (!isSpatialTarget()) fitSceneToCanvas(); });
boot();
</script>
